<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automotive 汽车线束产品目录册</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --gold: #e2b96f;
      --text: #e8e8e8;
      --text-dim: #a0a0b0;
      --page-w: 460px;
      --page-h: 636px;
    }
    
    body {
      font-family: 'Segoe UI', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* 顶部导航 */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,.1);
      gap: 12px;
    }
    
    .topbar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--gold);
    }
    
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 5px;
      color: var(--text);
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: all .2s;
    }
    .btn:hover { background: rgba(255,255,255,.15); }
    .btn.gold { 
      background: rgba(226,185,111,.2); 
      border-color: var(--gold);
      color: var(--gold);
    }
    
    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 5px;
      padding: 0 10px;
      height: 32px;
    }
    .search-box input {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 13px;
      width: 120px;
      outline: none;
    }
    .search-box input::placeholder { color: var(--text-dim); }
    
    /* 主体 */
    .main {
      flex: 1;
      display: flex;
      position: relative;
    }
    
    /* 侧边栏 */
    .sidebar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0;
      overflow: hidden;
      background: var(--surface);
      border-right: 1px solid rgba(255,255,255,.1);
      transition: width .3s;
      display: flex;
      flex-direction: column;
      z-index: 50;
    }
    .sidebar.open { width: 260px; }
    .sidebar.open { width: 260px; }
    .sidebar-inner { 
      width: 260px; 
      padding: 12px; 
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #tocList {
      flex: 1;
      overflow-y: auto;
    }
    .sidebar-title {
      font-size: 12px;
      color: var(--gold);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    /* 目录分类样式 */
    .toc-section {
      margin-bottom: 4px;
    }
    .toc-section-header {
      padding: 10px 12px;
      background: rgba(255,255,255,.08);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toc-section-header:hover {
      background: rgba(255,255,255,.15);
    }
    .toc-arrow {
      font-size: 10px;
      color: var(--gold);
      transition: transform .2s;
    }
    .toc-children {
      max-height: 0;
      overflow: hidden;
      transition: max-height .3s ease;
      padding-left: 8px;
    }
    .toc-section.open .toc-children {
      max-height: 500px;
    }
    .toc-child-item {
      padding: 8px 12px;
      margin: 2px 0;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all .2s;
    }
    .toc-child-item:hover {
      background: rgba(255,255,255,.08);
      color: var(--text);
    }
    .toc-child-page {
      font-size: 11px;
      color: var(--gold);
      opacity: .7;
    }
    .toc-child-item:hover .toc-child-page {
      opacity: 1;
    }
    
    /* 书本区域 */
    .book-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      perspective: 2000px;
    }
    
    /* 书本 */
    .book {
      display: flex;
      position: relative;
      transform-style: preserve-3d;
      filter: drop-shadow(0 20px 50px rgba(0,0,0,.7));
    }
    
    .page {
      width: 460px;
      height: 636px;
      background: #f5f5f0;
      position: relative;
      overflow: hidden;
    }
    .page img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: zoom-in;
    }
    
    .spine {
      width: 12px;
      background: linear-gradient(to right, #0a0a1a, #2a2a50, #0a0a1a);
    }
    
    /* 翻页动画元素 */
    .flipper {
      position: absolute;
      top: 0;
      width: var(--page-w);
      height: var(--page-h);
      transform-style: preserve-3d;
      display: none;
      z-index: 100;
    }
    .flipper.flipping-right {
      right: 0;
      transform-origin: left center;
    }
    .flipper.flipping-left {
      left: 0;
      transform-origin: right center;
    }
    .flipper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      backface-visibility: hidden;
    }
    
    @keyframes flipNext {
      from { transform: perspective(2000px) rotateY(0deg); }
      to { transform: perspective(2000px) rotateY(-180deg); }
    }
    @keyframes flipPrev {
      from { transform: perspective(2000px) rotateY(0deg); }
      to { transform: perspective(2000px) rotateY(180deg); }
    }
    
    .animate-next { animation: flipNext 0.5s ease-in-out forwards; }
    .animate-prev { animation: flipPrev 0.5s ease-in-out forwards; }
    
    /* 导航箭头 */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity .2s;
      z-index: 10;
    }
    .nav-btn:hover { opacity: 1; }
    .nav-btn.prev { left: 20px; }
    .nav-btn.next { right: 20px; }
    .nav-btn span {
      width: 40px;
      height: 40px;
      background: rgba(226,185,111,.3);
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--gold);
    }
    
    /* 页码 */
    .page-num {
      position: absolute;
      bottom: 8px;
      font-size: 11px;
      color: rgba(0,0,0,.3);
    }
    .page-num.left { left: 15px; }
    .page-num.right { right: 15px; }
    
    /* 搜索结果面板 */
    .search-panel {
      position: fixed;
      top: 52px;
      right: -400px;
      width: 380px;
      height: calc(100vh - 85px);
      background: var(--surface);
      border-left: 1px solid rgba(255,255,255,.1);
      transition: right .3s;
      z-index: 90;
      display: flex;
      flex-direction: column;
    }
    .search-panel.open { right: 0; }
    .search-panel-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .search-panel-title {
      font-size: 14px;
      color: var(--gold);
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .search-close {
      cursor: pointer;
      font-size: 16px;
      color: var(--text-dim);
      padding: 4px 8px;
      border-radius: 4px;
      transition: all .2s;
    }
    .search-close:hover {
      color: var(--text);
      background: rgba(255,255,255,.1);
    }
    .search-input-wrap {
      display: flex;
      gap: 8px;
    }
    .search-input-wrap input {
      flex: 1;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 5px;
      padding: 8px 12px;
      color: var(--text);
      outline: none;
    }
    .search-input-wrap input:focus { border-color: var(--gold); }
    .search-input-wrap button {
      background: var(--gold);
      border: none;
      border-radius: 5px;
      padding: 8px 16px;
      color: #1a1a2e;
      font-weight: 600;
      cursor: pointer;
    }
    
    .search-results {
      flex: 1;

      padding: 12px;
    }
    .search-result-item {
      padding: 12px;
      background: rgba(255,255,255,.05);
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;

    .search-result-item:hover {

    }
    .search-result-page {

    }
    .search-result-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .highlight {
      background: rgba(226,185,111,.4);
      color: #fff;
      padding: 0 2px;
      border-radius: 2px;
    }
    .search-status {
      text-align: center;
      padding: 20px;
      color: var(--text-dim);
      font-size: 13px;
    }
    
    /* 放大查看 */
    .zoom-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .zoom-overlay.active { display: flex; }
    .zoom-container {
      cursor: grab;
      transition: transform .1s;
    }
    .zoom-container:active { cursor: grabbing; }
    .zoom-container img {
      max-width: 90vw;
      max-height: 90vh;
      box-shadow: 0 20px 60px rgba(0,0,0,.8);
    }
    .zoom-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 50%;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .zoom-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.7);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-dim);
    }
    
    /* 底部 */
    .bottom-bar {
      height: 32px;
      background: var(--surface);
      border-top: 1px solid rgba(255,255,255,.1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-size: 12px;
      color: var(--text-dim);
    }
    
    .progress-bar {
      position: absolute;
      bottom: 32px;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,.05);
    }
    .progress-fill {
      height: 100%;
      background: var(--gold);
      transition: width .3s;
    }
    
    /* 加载 */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #loading h2 { color: var(--gold); }
    #loading-bar {
      width: 300px;
      height: 4px;
      background: rgba(255,255,255,.1);
      border-radius: 2px;
      overflow: hidden;
    }
    #loading-fill {
      height: 100%;
      background: var(--gold);
      width: 0%;
      transition: width .2s;
    }
    
    /* 响应式 */
    @media (max-width: 1000px) {
      :root { --page-w: 360px; --page-h: 498px; }

      .search-panel { width: 100%; right: -100%; }
      .topbar-title { display: none; }
    }
  </style>
</head>

<script>
const TOTAL_PAGES = 378;
const PAGES_DIR = 'pages/';
let currentSpread = 0;
let totalSpreads = 0;
let isAnimating = false;
let searchIndex = [];
let zoomScale = 1, zoomX = 0, zoomY = 0;
let isDragging = false;

function pageSrc(n) {
  return PAGES_DIR + 'page_' + String(n).padStart(3, '0') + '.png?v=' + Date.now();
}

function spreadToPages(s) {
  if (s === 0) return { left: null, right: 1 };
  const left = s * 2;
  const right = s * 2 + 1;
  return {
    left: left <= TOTAL_PAGES ? left : null,
    right: right <= TOTAL_PAGES ? right : null
  };
}

function pageToSpread(p) {
  return p <= 1 ? 0 : Math.floor(p / 2);
}

// 渲染当前展开
function render(s, animateDir) {
  const pages = spreadToPages(s);
  
  const imgLeft = document.getElementById('imgLeft');
  const imgRight = document.getElementById('imgRight');
  const pageLeft = document.getElementById('pageLeft');
  const pageRight = document.getElementById('pageRight');
  
  // 动画翻页
  if (animateDir && !isAnimating) {
    isAnimating = true;
    const flipper = document.getElementById('flipper');
    const flipImg = document.getElementById('flipImg');
    
    flipper.style.display = 'block';
    flipper.className = 'flipper flipping-' + (animateDir === 'next' ? 'right' : 'left');
    flipImg.src = animateDir === 'next' ? imgRight.src : imgLeft.src;
    
    void flipper.offsetWidth; // 强制重绘
    flipper.classList.add(animateDir === 'next' ? 'animate-next' : 'animate-prev');
    
    setTimeout(() => {
      flipper.style.display = 'none';
      flipper.classList.remove('animate-next', 'animate-prev');
      isAnimating = false;
    }, 500);
  }
  
  // 更新页面
  console.log('Rendering spread', s, 'pages:', pages);
  
  if (pages.left) {
    const src = pageSrc(pages.left);
    console.log('Loading left page:', src);
    imgLeft.src = src;
    imgLeft.onload = () => console.log('Left image loaded');
    imgLeft.onerror = (e) => console.error('Left image error:', e);
    pageLeft.style.display = 'block';
    document.getElementById('numLeft').textContent = pages.left;
  } else {
    pageLeft.style.display = 'none';
    console.log('No left page');
  }
  
  if (pages.right) {
    const src = pageSrc(pages.right);
    console.log('Loading right page:', src);
    imgRight.src = src;
    imgRight.onload = () => console.log('Right image loaded');
    imgRight.onerror = (e) => console.error('Right image error:', e);
    pageRight.style.display = 'block';
    document.getElementById('numRight').textContent = pages.right;
  } else {
    pageRight.style.display = 'none';
    console.log('No right page');
  }
  
  currentSpread = s;
  updateUI();
}

function updateUI() {
  const pages = spreadToPages(currentSpread);
  let text = '';
  if (pages.left && pages.right) text = `第 ${pages.left}-${pages.right} 页`;
  else if (pages.right) text = `第 ${pages.right} 页`;
  else text = `第 ${pages.left} 页`;
  
  document.getElementById('status').textContent = `${text} / 共 ${TOTAL_PAGES} 页`;
  document.getElementById('progress').style.width = ((currentSpread / totalSpreads) * 100) + '%';
}

function next() {
  if (currentSpread < totalSpreads && !isAnimating) {
    render(currentSpread + 1, 'next');
  }
}

function prev() {
  if (currentSpread > 0 && !isAnimating) {
    render(currentSpread - 1, 'prev');
  }
}

function goToPage(p) {
  const s = pageToSpread(p);
  if (s !== currentSpread) {
    render(s, s > currentSpread ? 'next' : 'prev');
  }
}

// 目录
function buildTOC() {
  const list = document.getElementById('tocList');
  
  tocData.forEach((section, idx) => {
    // 创建分类标题
    const sectionEl = document.createElement('div');
    sectionEl.className = 'toc-section';
    
    const header = document.createElement('div');
    header.className = 'toc-section-header';
    header.innerHTML = `<span class="toc-arrow">▶</span> ${section.title}`;
    header.onclick = () => {
      sectionEl.classList.toggle('open');
      const arrow = header.querySelector('.toc-arrow');
      arrow.textContent = sectionEl.classList.contains('open') ? '▼' : '▶';
    };
    
    // 创建子项容器
    const childrenEl = document.createElement('div');
    childrenEl.className = 'toc-children';
    
    section.children.forEach(child => {
      const item = document.createElement('div');
      item.className = 'toc-child-item';
      item.innerHTML = `<span class="toc-child-title">${child.title}</span><span class="toc-child-page">第${child.page}页</span>`;
      item.onclick = (e) => {
        e.stopPropagation();
        goToPage(child.page);
      };
      childrenEl.appendChild(item);
    });
    
    sectionEl.appendChild(header);
    sectionEl.appendChild(childrenEl);
    list.appendChild(sectionEl);
  });
}

// 搜索
async function loadSearchIndex() {
  try {
    const res = await fetch('search_index.json');
    console.log('Search index fetch result:', res.status, res.ok);
    if (res.ok) {
      searchIndex = await res.json();
      console.log('Search index loaded, total pages:', searchIndex.length);
    } else {
      console.error('Failed to load search index:', res.status);
    }
  } catch (e) {
    console.error('Search index load error:', e);
  }
}

function doSearch(query) {
  console.log('doSearch called with query:', query, 'searchIndex length:', searchIndex.length);
  if (!query || !searchIndex.length) {
    document.getElementById('searchResults').innerHTML = '<div class="search-status">请输入搜索词</div>';
    return;
  }
  
  const q = query.toLowerCase();
  const results = searchIndex.filter(item => item.text.toLowerCase().includes(q));
  
  const container = document.getElementById('searchResults');
  if (!results.length) {
    container.innerHTML = '<div class="search-status">未找到匹配内容</div>';
    return;
  }
  
  container.innerHTML = `<div class="search-status">找到 ${results.length} 个结果</div>`;
  results.forEach(r => {
    const idx = r.text.toLowerCase().indexOf(q);
    const snippet = r.text.substring(Math.max(0, idx - 30), idx + q.length + 30);
    const highlighted = snippet.replace(new RegExp(q, 'gi'), m => `<span class="highlight">${m}</span>`);
    
    const item = document.createElement('div');
    item.className = 'search-result-item';
    item.innerHTML = `<div class="search-result-page">第 ${r.page} 页</div><div class="search-result-text">...${highlighted}...</div>`;
    item.onclick = () => goToPage(r.page);
    container.appendChild(item);
  });
}

// 放大查看
function openZoom(page) {
  document.getElementById('zoomImg').src = pageSrc(page);
  document.getElementById('zoomOverlay').classList.add('active');
  zoomScale = 1; zoomX = 0; zoomY = 0;
  updateZoom();
}

function updateZoom() {
  document.getElementById('zoomContainer').style.transform = `translate(${zoomX}px, ${zoomY}px) scale(${zoomScale})`;
}

// 事件绑定
document.getElementById('navPrev').onclick = prev;
document.getElementById('navNext').onclick = next;
document.getElementById('btnToc').onclick = () => document.getElementById('sidebar').classList.toggle('open');

document.getElementById('contentSearch').oninput = function() {
  document.getElementById('searchPanel').classList.add('open');
  document.getElementById('panelSearchInput').value = this.value;
  doSearch(this.value);
};

document.getElementById('btnSearch').onclick = () => doSearch(document.getElementById('panelSearchInput').value);
document.getElementById('panelSearchInput').onkeydown = e => { if (e.key === 'Enter') doSearch(e.target.value); };

// 关闭搜索面板
document.getElementById('btnCloseSearch').onclick = () => {
  document.getElementById('searchPanel').classList.remove('open');
};

// 键盘事件（合并所有键盘功能）
document.addEventListener('keydown', function(e) {
  // ESC 关闭搜索面板
  if (e.key === 'Escape') {
    document.getElementById('searchPanel').classList.remove('open');
    return;
  }
  
  // 输入框内不响应翻页
  if (e.target.tagName === 'INPUT') return;
  
  // 翻页
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
});

document.getElementById('imgLeft').onclick = () => {
  const p = spreadToPages(currentSpread).left;
  if (p) openZoom(p);
};
document.getElementById('imgRight').onclick = () => {
  const p = spreadToPages(currentSpread).right;
  if (p) openZoom(p);
};

document.getElementById('btnZoomClose').onclick = () => document.getElementById('zoomOverlay').classList.remove('active');
document.getElementById('zoomOverlay').onclick = e => { if (e.target === e.currentTarget) document.getElementById('zoomOverlay').classList.remove('active'); };

// 拖拽（按住鼠标拖拽）
const zoomContainer = document.getElementById('zoomContainer');
let dragStartX = 0, dragStartY = 0;

zoomContainer.onmousedown = e => {
  isDragging = true;
  dragStartX = e.clientX - zoomX;
  dragStartY = e.clientY - zoomY;
  zoomContainer.style.cursor = 'grabbing';
  e.preventDefault();
};

document.onmousemove = e => {
  if (!isDragging) return;
  zoomX = e.clientX - dragStartX;
  zoomY = e.clientY - dragStartY;
  updateZoom();
};

document.onmouseup = () => {
  isDragging = false;
  zoomContainer.style.cursor = 'grab';
};

// 滚轮缩放
document.getElementById('zoomOverlay').onwheel = e => {
  e.preventDefault();
  zoomScale = Math.max(0.5, Math.min(4, zoomScale + (e.deltaY > 0 ? -0.1 : 0.1)));
  updateZoom();
};

// 滚轮翻页
document.querySelector('.book-area').onwheel = e => {
  e.preventDefault();
  if (e.deltaY > 0) next(); else prev();
};

// 全屏
document.getElementById('btnFullscreen').onclick = () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
};

// 缩放书本
let bookScale = 1;
document.getElementById('btnZoomIn').onclick = () => {
  bookScale = Math.min(1.5, bookScale + 0.1);
  document.getElementById('book').style.transform = `scale(${bookScale})`;
};
document.getElementById('btnZoomOut').onclick = () => {
  bookScale = Math.max(0.7, bookScale - 0.1);
  document.getElementById('book').style.transform = `scale(${bookScale})`;
};

// 初始化
async function init() {
  console.log('Initializing...');
  totalSpreads = Math.ceil((TOTAL_PAGES - 1) / 2);
  console.log('Total spreads:', totalSpreads);
  
  buildTOC();
  await loadSearchIndex();
  
  // 直接显示第一页，不等待加载
  document.getElementById('loading').style.display = 'none';
  render(0);
  console.log('First page rendered');
}

// 页面加载完成后初始化
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
